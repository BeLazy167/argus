# Self-hosts: change `app` to your own Fly app name before `fly deploy`.
app = 'argus-ai'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

# release_command runs once per deploy before new machines receive traffic. A non-zero exit
# from the migrator aborts the deploy — keeps the binary and the DB schema in lock-step.
[deploy]
  release_command = '/migrate'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '2s'
    path = '/healthz'
