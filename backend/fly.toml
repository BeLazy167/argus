app = 'argus-ai'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

# release_command runs once per deploy BEFORE new machines receive traffic. If migrations
# fail, the deploy aborts — which is exactly what we want (better than shipping a binary that
# expects columns that don't exist yet, as happened with migration 036).
[deploy]
  release_command = '/migrate'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '2s'
    path = '/healthz'
