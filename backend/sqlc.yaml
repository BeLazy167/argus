sql:
  - engine: "postgresql"
    queries: "internal/store/sqlc/query"
    schema: "internal/store/migrations"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "text[]"
            go_type:
              type: "[]string"
          - db_type: "jsonb"
            go_type:
              type: "RawMessage"
              import: "encoding/json"
          - db_type: "pg_catalog.int4"
            go_type:
              type: "int"
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              type: "int"
              pointer: true
          - db_type: "pg_catalog.int8"
            go_type:
              type: "int64"
          - db_type: "pg_catalog.int8"
            nullable: true
            go_type:
              type: "int64"
              pointer: true
          - db_type: "pg_catalog.int2"
            go_type:
              type: "int"
          - db_type: "pg_catalog.int2"
            nullable: true
            go_type:
              type: "int"
              pointer: true
